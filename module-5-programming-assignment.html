function BinarySearchTree() {
  function Node(key) {
    this.key = key;
    this.left = null;
    this.right = null
  }


  // the root node
  var root = null;

  // helper functions
  function insertNode(node, newNode) {
    if (newNode.key < node.key) {
      // go to left
      if (node.left === null) {
        // no left node yet so assign
        node.left = newNode;
      }
      else {
        // move down tree and repeat
        insertNode(node.left, newNode);
      }
    }
    else {
      // go to right
      if (node.right === null) {
        // no right node yet so assign
        node.right = newNode;
      }
      else {
        // move down tree and repeat
        insertNode(node.right, newNode);
      }
    }
  }

  this.insert = function(key) {
    // insert new key in the tree
    var newNode = new Node(key);
    if (root === null) {
      // no nodes yet
      root = newNode;
    }
    else {
      // find insert location through insertNode
      insertNode(root, newNode);
    }
  };

  this.search = function(key) {
    return searchNode(root, key); 
      function searchNode(node, key) {
        if (node === null) {
          return false;
        }
        if (key < node.key) {
          return searchNode(node.left, key);
        }
        else if (key > node.key) {
          return searchNode(node.right, key);
        }
        else {
          return true;
      }
      }

  };

  this.inOrderTraverse = function(callback) {
    inOrderTraverseNode(root, callback);  
       function inOrderTraverseNode(node, callback) {
        if (node != null) {
          inOrderTraverseNode(node.left, callback);
          callback(node.key);
          inOrderTraverseNode(node.right, callback);
        }
       }
      
  };
  

  this.preOrderTraverse = function(callback) {
    preOrderTraverseNode(root, callback); 
      function preOrderTraverseNode(node, callback) {
        if (node != null) {
          callback(node.key);
          preOrderTraverseNode(node.left, callback);
          preOrderTraverseNode(node.right, callback);
        }
      }
    
  };

  this.postOrderTraverse = function(callback) {
    postOrderTraverseNode(root, callback); 
      function postOrderTraverseNode(node, callback) {
        if (node != null) {
          postOrderTraverseNode(node.left, callback);
          postOrderTraverseNode(node.right, callback);
          callback(node.key);
        }
      }
    
  };

  this.min = function() {
    return minNode(root);
  }
  function minNode(node) {
    var current = node;
    while (current != null && current.left != null) {
      current = current.left;
    }
    return current;
  };

  this.max = function() {
    return maxNode(root);
  }
  function maxNode(node) {
    var current = node;
    while (current != null && current.right != null) {
      current = current.right;
    }
    return current;
  };

  this.remove = function() {
    this.root = removeNode(root, key); 
      function removeNode(node, key) {
        if (node == null) {
          return null;
        }
        if (this.compareFn(key, node.key) === Compare.LESS_THAN) {
          node.left = removeNode(node.left, key);
          return node;
        }
        else if (this.compareFn(key, node.key) === Compare.BIGGER_THAN) {
          node.right = removeNode(node.right, key);
          return node;
        }
        else {
          // key is equal to node.key
          // case 1: a leaf node
          if (node.left == null && node.right == null) {
            node = null;
            return node;
          }
          // case 2: a node with only one child
          if (node.left == null) {
            node = node.right;
            return node;
          }
          else if (node.right == null) {
            node = node.left;
            return node;
          }
          // case 3: a node with two children
          var aux = this.minNode(node.right);
          node.key = aux.key;
          node.right = removeNode(node.right, aux.key);
          return node;
        }
      }
    
  };

  this.print = function() {

        // text for right child

        // traverse left
        print(node.left);
        // traverse right
        print(node.right);
      }
    }
    console.log("===tree===");

}

function Dictionary() {
  // store all elements in the items object
  var items = {};

  this.toStrFn = function(key) {
    if (key === null) {
      return "NULL";
    } else if (key === undefined) {
      return "UNDEFINED";
    } else if (typeof key === "string" || key instanceof String) {
      return key;
    }
    return key.toString();
  };

  this.set = function(key, value) {
    if (key != null && value != null) {
      var tableKey = this.toStrFn(key);
      items[tableKey] = { key: key, value: value };
      return true;
    }
    return false;
  };

  this.delete = function(key) {
    if (this.has(key)) {
      delete items[this.toStrFn(key)];
      return true;
    }
    return false;
  };

  this.has = function(key) {
    return items[this.toStrFn(key)] != null;
  };

  this.get = function(key) {
    
    var valuePair = items[this.toStrFn(key)];
    return valuePair == null ? undefined : valuePair.value;
 
  };

  this.clear = function() {
    items = {};
  };

  this.size = function() {
    return Object.keys(items).length;
  };

  this.keys = function() {
    return Object.keys(items).map(key => items[key].key);
  };

  this.values = function() {
    return Object.values(items).map(valuePair => valuePair.value);
  };

  this.getItems = function() {
    return items;
  };
}

class Graph {
  constructor(isDirected = false) {
    this.isDirected = isDirected;
    this.vertices = [];
    this.adjList = new Dictionary();
 }

 addVertex(v) {
    if (!this.vertices.includes(v)) {
      this.vertices.push(v);
      this.adjList.set(v, []);
    }
  }

addEdge(v, w) {
  if (!this.adjList.has(v)) {
    this.addVertex(v);
  }
  if (!this.adjList.get(w)) {
    this.addVertex(w);
  }
  this.adjList.get(v).push(w);
  if (!this.isDirected) {
    this.adjList.get(w).push(v);
 }
}

  getVertices() {
    return this.vertices;
  }
  getadjList() {
    return this.adjList;
  }
 
  toString() {
  var s = '';
  for (var i = 0; i < this.vertices.length; i++) {
    s += this.vertices[i] + ' -> ';
    var neighbors = this.adjList.get(this.vertices[i]);
    for (var j = 0; j < neighbors.length; j++) {
      s += neighbors[j] + ' ';
    }
    s += '\n';
  }
  return s;
 }

 }

function Queue() {
  var items = [];

  this.enqueue = function(element) {
    items.push(element);
  };
  this.dequeue = function() {
    return items.shift();
  };
    
  this.front = function() {
    return items[0];
  };

this.isEmpty = function(){
    return items.length === 0;
  };
  this.size = function() {
    return items.length;
  }
this.print = function() {
  console.log(items);
};
}

var Colors = {
  WHITE: 0,
  GREY: 1,
  BLACK: 2
}

var initializeColor = vertices => {
  var color = {};
  for (var i = 0; i < vertices.length; i++) {
    color[vertices[i]] = Colors.WHITE;
  }
  return color;
}

 var breadthFirstSearch = function(graph, startVertex, callback)  {
  var vertices = graph.getVertices();
  var adjList = graph.getadjList();
  var color = initializeColor(vertices);
  var queue = new Queue();

  queue.enqueue(startVertex);

  while (!queue.isEmpty()) {
    var u = queue.dequeue();
    var neighbors = adjList.get(u);
    color[u] = Colors.GREY;
    for (var i = 0; i < neighbors.length; i++) {
      var w = neighbors[i];
      if (color[w] === Colors.WHITE) {
        color[w] = Colors.GREY;
        queue.enqueue(w);
      }
    }
    color[u] = Colors.BLACK;
    if (callback) {
      callback(u);
    }
  }
};

var depthFirstSearch = function(graph, callback) {
  var vertices = graph.getVertices();
  var adjList = graph.getadjList();
  var color = initializeColor(vertices);

  for (var i = 0; i < vertices.length; i++) {
    if (color[vertices[i]] === Colors.WHITE) {
      depthFirstSearchVisit(vertices[i], color, adjList, callback);
    }
  }
};

var depthFirstSearchVisit = function(u, color, adjList, callback) {
  color[u] = Colors.GREY;
  if (callback) {
    callback(u);
  }

  var neighbors = adjList.get(u);
  for (var i = 0; i < neighbors.length; i++) {
    var w = neighbors[i];
    if (color[w] === Colors.WHITE) {
      depthFirstSearchVisit(w, color, adjList, callback);
    }
  }
  color[u] = Colors.BLACK;
};
