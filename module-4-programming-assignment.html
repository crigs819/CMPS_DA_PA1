function Set() {
  var items = {}; // note that this is an object instead of an array

  this.add = function(value) {
    if (!this.has(value)) {
      items[value] = value;
      return true;
    }
    return false;
  };

  this.delete = function(value) {
    if (this.has(value)) {
      delete items[value];
      return true;
    }
    return false;
  };

  this.has = function(value) {
    return value in items;
  };

  this.clear = function() {
    items = {};
  };

  this.size = function() {
    return this.values().length;
  };

  this.values = function() {
    return Object.values(items);
  };

  this.union = function(otherSet) {
    var unionSet = new Set();
    values().forEach(value => unionSet.add(value));
    otherSet.values().forEach(value => unionSet.add(value));
    return unionSet;
  };
  
  this.intersection = function(otherSet) {
    var interssectionSet = new Set();

    var values = this.values();
    for (var i = 0; i < values.length; i++) {
      if (otherSet.has(values[i])) {
        interssectionSet.add(values[i]);  
  }
}
return interssectionSet;
};

this.difference = function(otherSet) {
  var differenceSet = new Set();
  this.values().every(value => {
    if (!otherSet.has(value)) {
      differenceSet.add(value);
    }
  });
  return differenceSet;
};
this.isSubsetOf = function(otherSet) {
  if (this.size() > otherSet.size()) {
    return false;
  }
  var isSubset = true;
  this.values().every(value => {
    if (!otherSet.has(value)) {
      isSubset = false;
      return false;
    }
    return true;
  });
  return isSubset;
};
}

function Dictionary() {
  // store all elements in the items object
  var items = {};

  this.toStrFn = function(key) {
    if (key === null) {
      return "NULL";
    } else if (key === undefined) {
      return "UNDEFINED";
    } else if (typeof key === "string" || key instanceof String) {
      return key;
    }
    return key.toString();
  };

  this.set = function(key, value) {
    if (key != null && value != null) {
      var tableKey = this.toStrFn(key);
      items[tableKey] = new ValuePair(key, value);
      return true;
    }
    return false;
  };

  this.delete = function(key) {
    if (this.has(key)) {
      delete items[this.toStrFn(key)];
      return true;
    }
    return false;
  };

  this.has = function(key) {
    return items[this.toStrFn(key)] != null;
  };

  this.get = function(key) {
    
    var valuePair = items[this.toStrFn(key)];
    return valuePair == null ? undefined : valuePair.value;
 
  };

  this.clear = function() {
    items = {};
  };

  this.size = function() {
    return Object.keys(items).length;
  };

  this.keys = function() {
    return Object.keys(items).map(key => items[key].key);
  };

  this.values = function() {
    return Object.values(items).map(valuePair => valuePair.value);
  };

  this.getItems = function() {
    return items;
  };
}

function ValuePair(key, value) {
  this.key = key;
  this.value = value;
  this.toString = function() {
    return "[" + this.key + " - " + this.value + "]";
  };
 
};

function Node(element) {
  this.element = element;
  this.next = null;
}

function LinkedList() {
  this.length = 0;
  this.head = null;
}

LinkedList.prototype.append = function(element) {
  var node = new Node(element);
  if (this.head === null) {
    this.head = node;
  }
  else {
    var tmp = this.head;
    while (tmp.next !== null) {
      tmp = tmp.next;
    }
    tmp.next = node;
  }
  this.length++;
};

LinkedList.prototype.insert = function(position, element) {
  var node = new Node(element);
  if (position === 0) {
    var oldHead = this.head;
    this.head = node;
    this.head.next = oldHead;
  }
  else {
    var tmp = this.head;
    for (var i = 0; i < position-1; i++) {
      tmp = tmp.next;
    }
    node.next = tmp.next;
    tmp.next = node;
  }
  this.length++;
};

LinkedList.prototype.removeAt = function(position) {
  var element = null;
  if (position === 0) {
    element = this.head.element;
    this.head = this.head.next;
  }
  else {
    var tmp = this.head;
    for (var i = 0; i < position-1; i++) {
      tmp = tmp.next;
    }
    element = tmp.next.element;
    var prev = tmp;
    var middle = tmp.next;
    var next = middle.next;
    prev.next = next;
  }
  this.length--;
  return element;
};

LinkedList.prototype.remove = function(element) {
  var position = this.indexOf(element);
  return this.removeAt(position);
};

LinkedList.prototype.indexOf = function(element) {
  var tmp = this.head;
  for (var i = 0; i < this.length; i++) {
    if (tmp.element === element) {
      return i;
    }
    tmp = tmp.next;
  }
  return -1;
};

LinkedList.prototype.isEmpty = function() {
  return this.length === 0;
};

LinkedList.prototype.size = function() {
  var length = 0;
  var tmp = this.head;
  while (tmp !== null) {
    length++;
    tmp = tmp.next;
  }
  return length;
};

LinkedList.prototype.getHead = function() {
  return this.head;
}

LinkedList.prototype.toString = function() {
  var current = this.head;
  var string = "List: ";
  while (current) {
    string += current.element + (current.next ? " -> " : "");
    current = current.next;
  }
  return string;
};

LinkedList.prototype.print = function() {
  console.log(this.toString());
};

// 1. Finish the implemention of the hash table data structure below. Note that

function HashTable() {
  // store all elements in the table array
  var table = [];

  // define hash function
   this.loseloseHashCode = function loseloseHashCode(key) {
    var hash = 0;
    for (var i = 0; i < key.length; i++) {
      hash += key.charCodeAt(i);
    }
    return hash % 37;
  };

 this.hashCode = function hashCode(key) {
    return this.loseloseHashCode(key);
  };
  

  this.put = function(key, value) {
    if (key != null && value != null) {
      var position = this.hashCode(key);
      if (table[position] == null) {
        table[position] = new LinkedList();
      }
      table[position].append(new ValuePair(key, value));
      return true;
    }
    return false;
  };

  this.remove = function(key) {
    var position = this.hasCode(key);
    var linkenList = this.table[position];
    if (linkedList != null && !linkedList.isEmpty()) {
      var current = linkedList.getHead();
      while (current != null) {
        if (current.element.key === key) {
          linkedList.remove(current.element);
          if (linkedList.isEmpty()) {
            delete table[position];
        }
        return true;
      }
       current = current.next;
      }
    }
    return false;
  };

  this.get = function(key) {
    var position = this.hashCode(key);
    var linkedList = table[position];
    if (linkedList != null && !linkedList.isEmpty()) {
      var current = linkedList.getHead();
      while (current) {
        if ( current.element.key === key) {
          return current.element.value;
        }
        current = current.next;
      }
    }
    return undefined;
  };

  this.print = function() {
    // print the content of the hash table
    for (var i = 0; i < table.length; i++) {
      if (table[i] !== undefined) {
        console.log(i + ": " + table[i]);
      }
    }
  };
}
