// helper functions
BinarySearchTree.prototype._insertNode = function(node, newNode) {
  // node is the node we want to insert into
  // newNode is the node we want to insert
  if (newNode.key < node.key) {
    // go to left
    if (node.left === null) {
      // no left node yet so assign
      node.left = newNode;
    }
    else {
      // move down tree and repeat
      this._insertNode(node.left, newNode);
    }
  }
  else {
    // go to right
    if (node.right === null) {
      // no right node yet so assign
      node.right = newNode;
    }
    else {
      // move down tree and repeat
      this._insertNode(node.right, newNode);
    }
  }
}

BinarySearchTree.prototype.insert = function(key) {
  // insert new key in the tree
  var newNode = new Node(key);
  if (this.root === null) {
    // no nodes yet
    this.root = newNode;
  }
  else {
    // find insert location through insertNode
    this._insertNode(this.root, newNode);
  }
};

function Dictionary() {
  // store all elements in the items object
  var items = {};

  this.toStrFn = function(key) {
    if (key === null) {
      return "NULL";
    } else if (key === undefined) {
      return "UNDEFINED";
    } else if (typeof key === "string" || key instanceof String) {
      return key;
    }
    return key.toString();
  };

  this.set = function(key, value) {
    if (key != null && value != null) {
      var tableKey = this.toStrFn(key);
      items[tableKey] = { key: key, value: value };
      return true;
    }
    return false;
  };

  this.delete = function(key) {
    if (this.has(key)) {
      delete items[this.toStrFn(key)];
      return true;
    }
    return false;
  };

  this.has = function(key) {
    return items[this.toStrFn(key)] != null;
  };

  this.get = function(key) {
    
    var valuePair = items[this.toStrFn(key)];
    return valuePair == null ? undefined : valuePair.value;
 
  };

  this.clear = function() {
    items = {};
  };

  this.size = function() {
    return Object.keys(items).length;
  };

  this.keys = function() {
    return Object.keys(items).map(key => items[key].key);
  };

  this.values = function() {
    return Object.values(items).map(valuePair => valuePair.value);
  };

  this.getItems = function() {
    return items;
  };
}

function Graph (isDirected = false) {

 Graph.prototype.addVertex = function(v) {

Graph.prototype.addEdge = function (v, w) {
  if (!this.adjList.get(v)) {
    this.addVertex(v);
  }
  if (!this.adjList.get(w)) {
    this.addVertex(w);
  }
  this.adjList.get(v).push(w);
  if (!this.isDirected) {
    this.adjList.get(w).push(v);
 }
};

    for (var j = 0; j < neighbors.length; j++) {
      s += neighbors[j] + ' ';
    }
    s += '\n';
  }
  return s;
 };
}

var Infinity = Number.MAX_SAFE_INTEGER;

minKey = (graph, key, visited) => {
  var min = Infinity;
  var minIndex = -1;
  for (var v = 0; v < graph.length; v++) {
    if (!visited[v] && key[v] < min) {
      min = key[v];
      minIndex = v;
    }
  }
  return minIndex;
};

var prim = graph => {
  var parent = [];
  var key = [];
  var visited = [];
  var { length } = graph;
  for (var i = 0; i < length; i++) {
    key[i] = Infinity;
    visited[i] = false;
  }
  key[0] = 0;
  parent[0] = -1;
  for (var i = 0; i < length - 1; i++) {
    var u = minKey(graph, key, visited);
    visited[u] = true;
    for (var v = 0; v < length; v++) {
      if (graph[u][v] && !visited[v] && graph[u][v] < key[v]) {
        parent[v] = u;
        key[v] = graph[u][v];
      }
    }
  }
  return parent;
};
