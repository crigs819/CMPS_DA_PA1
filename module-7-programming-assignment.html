// 1. Implement fibonnacci using a recursive function and test your code.
console.log("Fibonacci Recursion")
function fibonnacci(n) {
  if (n < 1) return 0;
  if(n <= 2) return 1;
  return fibonnacci(n - 1) + fibonnacci(n - 2);
}

// 1. Implement the minimum coin change problem using dynamic programming.
//    Test your code.
console.log("Min Coin Change")
function minCoinChange (coins, amount) {
  var cache = [];
  var makeChange = (value) => {
    if (!value) {
      return[];
    }
    if(cache[value]) {
      return cache[value];
    }
    var min = [];
    var newMin;
    var newAmount;
    for (let i =0; i <coins.length; i++) {
      var coin = coins[i];
      newAmount = value - coin;
      if (newAmount >= 0) {
        newMin = makeChange(newAmount);
      }
      if (
        newAmount >= 0 &&
        (newMin.length < min.length - 1 || !min.length) &&
        (newMin.length || !newAmount)
      ) {
        min = [coin].concat(newMin);
        console.log('new Min ' + min + ' for ' + amount);
      }
    }
    return (cache[value] = min);
  };
  return makeChange(amount);
}
console.log(minCoinChange([1, 5, 10, 25], 36));

console.log("Greedy algorithms");

// 1. Implement the minimum coin change problem using a greedy algorithm.
//    Test your code.
console.log("Greedy Min Coin Change")
function minGreedyCoinChange(coins, amount) {
  var change = [];
  var total = 0;
  for (let i = coins.length; i >= 0; i--) {
    var coin = coins[i];
    while (total + coin <= amount) {
      change.push(coin);
      total += coin;
    }
  }
  return change;
}
console.log(minGreedyCoinChange([1, 5, 10, 25], 36));
