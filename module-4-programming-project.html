function ValuePair(key, value) {
  this.key = key;
  this.value = value;
  this.toString = function() {
    return "[" + this.key + " - " + this.value + "]";
  };
 
};

function Node(element) {
  this.element = element;
  this.next = null;
}

function LinkedList() {
  this.length = 0;
  this.head = null;
}

LinkedList.prototype.append = function(element) {
  var node = new Node(element);
  if (this.head === null) {
    this.head = node;
  }
  else {
    var tmp = this.head;
    while (tmp.next !== null) {
      tmp = tmp.next;
    }
    tmp.next = node;
  }
  this.length++;
};

LinkedList.prototype.insert = function(position, element) {
  var node = new Node(element);
  if (position === 0) {
    var oldHead = this.head;
    this.head = node;
    this.head.next = oldHead;
  }
  else {
    var tmp = this.head;
    for (var i = 0; i < position-1; i++) {
      tmp = tmp.next;
    }
    node.next = tmp.next;
    tmp.next = node;
  }
  this.length++;
};

LinkedList.prototype.removeAt = function(position) {
  var element = null;
  if (position === 0) {
    element = this.head.element;
    this.head = this.head.next;
  }
  else {
    var tmp = this.head;
    for (var i = 0; i < position-1; i++) {
      tmp = tmp.next;
    }
    element = tmp.next.element;
    var prev = tmp;
    var middle = tmp.next;
    var next = middle.next;
    prev.next = next;
  }
  this.length--;
  return element;
};

LinkedList.prototype.remove = function(element) {
  var position = this.indexOf(element);
  return this.removeAt(position);
};

LinkedList.prototype.indexOf = function(element) {
  var tmp = this.head;
  for (var i = 0; i < this.length; i++) {
    if (tmp.element === element) {
      return i;
    }
    tmp = tmp.next;
  }
  return -1;
};

LinkedList.prototype.isEmpty = function() {
  return this.length === 0;
};

LinkedList.prototype.size = function() {
  var length = 0;
  var tmp = this.head;
  while (tmp !== null) {
    length++;
    tmp = tmp.next;
  }
  return length;
};

LinkedList.prototype.getHead = function() {
  return this.head;
}

LinkedList.prototype.toString = function() {
  var current = this.head;
  var string = "List: ";
  while (current) {
    string += current.element + (current.next ? " -> " : "");
    current = current.next;
  }
  return string;
};

LinkedList.prototype.print = function() {
  console.log(this.toString());

// 1. Implement the set data structure using the prototype.

function Set() {
  this.items = {}; 

  Set.prototype.add = function(value) {
    if (!this.has(value)) {
      this.items[value] = value;
      return true;
    }
    return false;
  };

  Set.prototype.delete = function(value) {
    if (this.has(value)) {
      delete this.items[value];
      return true;
    }
    return false;
  };

   Set.prototype.has = function(value) {
    return value in this.items;
  };

   Set.prototype.clear = function() {
    this.items = {};
  };

   Set.prototype.size = function() {
    return this.values().length;
  };

   Set.prototype.values = function() {
    return Object.values(this.items);
  };

   Set.prototype.union = function(otherSet) {
    this.unionSet = new Set();
    this.values().forEach(value => this.unionSet.add(value));
    otherSet.values().forEach(value => this.unionSet.add(value));
    return this.unionSet;
  };
  
   Set.prototype.intersection = function(otherSet) {
    var interssectionSet = new Set();

    var values = this.values();
    for (var i = 0; i < values.length; i++) {
      if (otherSet.has(values[i])) {
        interssectionSet.add(values[i]);  
  }
}
return interssectionSet;
};

 Set.prototype.difference = function(otherSet) {
  var differenceSet = new Set();
  this.values().every(value => {
    if (!otherSet.has(value)) {
      differenceSet.add(value);
    }
  });
  return differenceSet;
};

 Set.prototype.isSubsetOf = function(otherSet) {
  if (this.size() > otherSet.size()) {
    return false;
  }
  var isSubset = true;
  this.values().every(value => {
    if (!otherSet.has(value)) {
      isSubset = false;
      return false;
    }
    return true;
  });
  return isSubset;
};
}

// 6. Implement the dictionary data structure using the prototype.

function Dictionary() {
  this.items = {};

  Dictionary.prototype.toStrFn = function(key) {
    if (key === null) {
      return "NULL";
    } else if (key === undefined) {
      return "UNDEFINED";
    } else if (typeof key === "string" || key instanceof String) {
      return key;
    }
    return key.toString();
  };

  Dictionary.prototype.set = function(key, value) {
    if (key != null && value != null) {
      var tableKey = this.toStrFn(key);
      this.items[tableKey] = new ValuePair(key, value);
      return true;
    }
    return false;
  };

  Dictionary.prototype.delete = function(key) {
    if (this.has(key)) {
      delete this.items[this.toStrFn(key)];
      return true;
    }
    return false;
  };

  Dictionary.prototype.has = function(key) {
    return this.items[this.toStrFn(key)] != null;
  };

  Dictionary.prototype.get = function(key) {
    
    var valuePair = this.items[this.toStrFn(key)];
    return valuePair == null ? undefined : valuePair.value;
 
  };

  Dictionary.prototype.clear = function() {
    this.items = {};
  };

  Dictionary.prototype.size = function() {
    return Object.keys(this.items).length;
  };

  Dictionary.prototype.keys = function() {
    return Object.keys(this.items).map(key => this.items[key].key);
  };

  Dictionary.prototype.values = function() {
    return Object.values(this.items).map(valuePair => valuePair.value);
  };

  Dictionary.prototype.getItems = function() {
    return this.items;
  };
  
  Dictionary.prototype.print = function() {
    var valuePairs = Object.values(this.items);
    var result = "";
    for (var i = 0; i < valuePairs.length; i++) {
      result += valuePairs[i].toString() + " ";
    }
    console.log(result.trim());
  };
}

function ValuePair(key, value) {
  this.key = key;
  this.value = value;
  this.toString = function() {
    return "[" + this.key + " - " + this.value + "]";
  };
 
};
// 7. Complete the method below that adds all key-value pairs from one
//    dictionary into another. See also the example below.

Dictionary.prototype.merge = function(dict) {
  var dictItems = dict.getItems();
  for (var key in dictItems) {
    if (dictItems.hasOwnProperty(key)) {
      var valuePair = dictItems[key];
      this.set(valuePair.key, valuePair.value);
    }
  }
};
