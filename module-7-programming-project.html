// 1. Implement factorial using a recursive function and test your code.
function factorial(n) {
  if (n === 1 || n === 0) {
    return 1;
  }
  return n * factorial(n - 1);
}
console.log(factorial(5));
// 2. Implement a function that returns the complete fibonacci sequence in an
//    array for a given number.
function fibonacciSequence(n) {
  if (n === 0) return [0];

  var sequence = [0, 1];
  for (var i = 2; i <= n; i++) {
    sequence.push(sequence[i - 1] + sequence[i - 2])
  }
  return sequence;
};

console.log(fibonacciSequence(5));

function lcs(wordX, wordY) {
  var m = wordX.length;
  var n = wordY.length;
  

  var lengths = [];

  var directions = [];
  

  for (var i = 0; i <= m; i++) {
    lengths[i] = [];
    directions[i] = [];
    for (var j = 0; j <= n; j++) {
      lengths[i][j] = 0;
      directions[i][j] = '0';
    }
  }
  

  for (var i = 1; i <= m; i++) {
    for (var j = 1; j <= n; j++) {
      if (wordX[i - 1] === wordY[j - 1]) {
        lengths[i][j] = lengths[i - 1][j - 1] + 1;
        directions[i][j] = 'diagonal';
      } else {
        var top = lengths[i - 1][j];
        var left = lengths[i][j - 1];
        if (top >= left) {
          lengths[i][j] = top;
          directions[i][j] = 'top';
        } else {
          lengths[i][j] = left;
          directions[i][j] = 'left';
        }
      }
    }
  }
  
  printSolution(directions, wordX, m, n);
}

function printSolution(directions, wordX, m, n) {
  var a = m;
  var b = n;
  var x = directions[a][b];
  var answer = '';
  
  while (x !== '0') {
    if (directions[a][b] === 'diagonal') {
      answer = wordX[a - 1] + answer;
      a--;
      b--;
    } else if (directions[a][b] === 'left') {
      b--;
    } else if (directions[a][b] === 'top') {
      a--;
    }
    x = directions[a][b];
  }
  
  console.log('lcs: ' + answer);
}

// 4. Solve the problem of summing all the numbers in an array using
//    imperative style.
console.log("Sum Array Imperative")
function sumArray(array) {
  var total = 0;
  for (var num of array) {
    total += num;
  }
  return total;
}
console.log(sumArray([10, 10, 10]))
// 5. Solve the problem of summing all the numbers in an array using
//    functional style.
console.log("Sum Array Functional")
var add = (a, b) => a + b;
var sumArr = (arr) => arr.reduce(add);

console.log(sumArr([10, 10, 10]))

console.log("Kollatz Function")
function collatz(n) {
  console.log(n)
  if (n === 1) return;
  if (n % 2 === 0) {
    collatz(n / 2)
  } else {
    collatz(3 * n + 1)
  }
}
